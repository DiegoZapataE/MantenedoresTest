<div class="wrapper">
  <div class="form-container">
    <h2>{{ editando ? 'Editar Rol' : 'Crear Rol' }}</h2>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Nombre</mat-label>
        <input matInput [(ngModel)]="nuevoRol.nombre" />
      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        (click)="guardarRol()"
        [disabled]="!nuevoRol.nombre"
      >
        {{ editando ? 'Actualizar' : 'Crear' }}
      </button>
    </div>
  </div>

  <div class="table-container">
    <h1>Roles</h1>

    <table mat-table [dataSource]="(roles$ | async) ?? []" class="mat-elevation-z8">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let r">{{ r.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let r">
          <button mat-button color="primary" (click)="editarRol(r)">Editar</button>
          <button mat-button color="warn" (click)="eliminarRol(r.id)">Eliminar</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnas"></tr>
      <tr mat-row *matRowDef="let row; columns: columnas"></tr>
    </table>
  </div>
</div>
