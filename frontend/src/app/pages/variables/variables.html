<div class="wrapper">
  <div class="form-container">
    <h2>{{ editando ? 'Editar Variable' : 'Crear Variable' }}</h2>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Nombre</mat-label>
        <input matInput [(ngModel)]="nuevaVariable.nombre" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Valor</mat-label>
        <input matInput [(ngModel)]="nuevaVariable.valor" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Tipo</mat-label>
        <mat-select [(ngModel)]="nuevaVariable.tipo">
          <mat-option value="string">String</mat-option>
          <mat-option value="number">Number</mat-option>
          <mat-option value="boolean">Boolean</mat-option>
        </mat-select>
      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        (click)="guardarVariable()"
        [disabled]="!nuevaVariable.nombre || !nuevaVariable.valor || !nuevaVariable.tipo"
      >
        {{ editando ? 'Actualizar' : 'Crear' }}
      </button>
    </div>
  </div>

  <div class="table-container">
    <h1>Variables</h1>

    <table mat-table [dataSource]="(variables$ | async) ?? []" class="mat-elevation-z8">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let v">{{ v.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="valor">
        <th mat-header-cell *matHeaderCellDef>Valor</th>
        <td mat-cell *matCellDef="let v">{{ v.valor }}</td>
      </ng-container>

      <ng-container matColumnDef="tipo">
        <th mat-header-cell *matHeaderCellDef>Tipo</th>
        <td mat-cell *matCellDef="let v">{{ v.tipo }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let v">
          <button mat-button color="primary" (click)="editarVariable(v)">Editar</button>
          <button mat-button color="warn" (click)="eliminarVariable(v.id)">Eliminar</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnas"></tr>
      <tr mat-row *matRowDef="let row; columns: columnas"></tr>
    </table>
  </div>
</div>
