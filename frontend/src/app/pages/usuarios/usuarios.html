<div class="wrapper">
  <div class="form-container">
    <h2>Crear Usuario</h2>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Nombre</mat-label>
        <input matInput [(ngModel)]="nuevoUsuario.nombre" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput [(ngModel)]="nuevoUsuario.email" type="email" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Rol</mat-label>
        <mat-select [(ngModel)]="nuevoUsuario.rolId">
          <mat-option [value]="null">Seleccione Rol</mat-option>
          <mat-option *ngFor="let r of roles$ | async" [value]="r.id">
            {{ r.nombre }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        (click)="guardarUsuario()"
        [disabled]="!nuevoUsuario.nombre || !nuevoUsuario.email || !nuevoUsuario.rolId"
      >
        {{ editando ? 'Actualizar' : 'Crear' }}
      </button>
    </div>
  </div>

  <div class="table-container">
    <h1>Usuarios</h1>

    <table mat-table [dataSource]="(usuarios$ | async) ?? []" class="mat-elevation-z8">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let u">{{ u.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let u">{{ u.email }}</td>
      </ng-container>

      <ng-container matColumnDef="rol">
        <th mat-header-cell *matHeaderCellDef>Rol</th>
        <td mat-cell *matCellDef="let u">{{ u.rol?.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>

        <td mat-cell *matCellDef="let u">
          <button mat-button color="primary" (click)="editarUsuario(u)">Editar</button>
          <button mat-button color="warn" (click)="eliminarUsuario(u.id)">Eliminar</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnas"></tr>
      <tr mat-row *matRowDef="let row; columns: columnas"></tr>
    </table>
  </div>
</div>
